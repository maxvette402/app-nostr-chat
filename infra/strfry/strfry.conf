##
## strfry configuration for self-hosted Nostr relay
##

# Listening address and port
bind = "0.0.0.0"
port = 7777

# Database directory (mapped to Docker volume)
db = "/app/strfry-db"

# Relay information (NIP-11)
info {
    name = "nostr-chat relay"
    description = "Self-hosted strfry relay for nostr-chat"
    pubkey = ""         # optional: hex pubkey of relay operator
    contact = ""        # optional: contact email
}

# Event limits
events {
    maxEventSize = 65536
    rejectEventsNewerThanSeconds = 900
    rejectEventsOlderThanSeconds = 94608000  # 3 years
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 2000
    maxTagValSize = 1024
}

# WebSocket
websocket {
    maxMessageSize = 131072
    hearbeatInterval = 55
    closeAfterIdle = 1800
}

# Logging
log {
    level = "info"
}
